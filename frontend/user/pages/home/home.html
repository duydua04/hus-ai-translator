<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../../assets/styles/base.css" />
    <link rel="stylesheet" href="../../assets/styles/layout.css" />
    <link rel="stylesheet" href="../../assets/styles/components.css" />
    <link rel="stylesheet" href="home.css" />

    <title>Home</title>
  </head>

  <body>
    <!-- HEADER -->
    <header class="header">
      <a href="#" class="header__brand">
        <i class="bx bx-store header__brand-icon"></i>
        <span class="header__brand-text">Site name</span>
      </a>

      <nav class="header__nav">
        <a href="home.html" class="header__link header__link--active"
          >Trang chủ</a
        >
        <a href="../trans-files/trans-files.html" class="header__link"
          >Dịch ngay</a
        >
        <a href="../about-us/about-us.html" class="header__link"
          >Về chúng tôi</a
        >
      </nav>

      <button class="btn btn--primary">Đăng nhập</button>
    </header>

    <!-- HERO (dịch văn bản) -->
    <section class="translator">
      <div class="translator__box">
        <div class="translator__tabs">
          <span class="translator__tab translator__tab--active">Tiếng Anh</span>
          <i class="bx bx-transfer"></i>
          <span class="translator__tab">Tiếng Việt</span>
        </div>

        <div class="translator__content">
          <textarea
            class="translator__input"
            placeholder="Nhập văn bản..."
          ></textarea>
          <textarea
            class="translator__output"
            placeholder="Bản dịch..."
            disabled
          ></textarea>
        </div>

        <div class="translator__selector">
          <div class="translator__selector-left">0/5000 ki tu</div>

          <div class="translator__selector-right">
            <button class="action-btn action-btn--delete" title="Xoa">
              <i class="bx bx-trash action-btn__icon"></i>
            </button>
            <button class="action-btn action-btn--copy" title="Copy">
              <i class="bx bx-copy action-btn__icon"></i>
            </button>
            <button class="action-btn action-btn--read" title="Doc to">
              <i class="bx bx-transfer action-btn__icon"></i>
            </button>
          </div>
        </div>

        <div class="translator__action">
          <button class="btn btn--primary">Dịch ngay</button>
        </div>
      </div>
    </section>

    <!-- INTRO -->
    <section class="intro">
      <div class="intro__first">
        <h2 class="intro__title">Hỗ trợ dịch</h2>
        <div class="intro__grid">
          <div class="intro__card">
            <img src="https://picsum.photos/300/200" class="intro__img" />
            <p class="intro__text">Văn bản</p>
          </div>

          <div class="intro__card">
            <img src="https://picsum.photos/301/200" class="intro__img" />
            <p class="intro__text">Tài liệu</p>
          </div>
        </div>
      </div>

      <div class="intro__second">
        <h2 class="intro__title">Giúp bạn</h2>
        <div class="intro__grid">
          <div class="intro__card">
            <img src="https://picsum.photos/302/200" class="intro__img" />
            <p class="intro__text">Dịch thuật chính xác</p>
          </div>

          <div class="intro__card">
            <img src="https://picsum.photos/303/200" class="intro__img" />
            <p class="intro__text">Đánh giá chất lượng</p>
          </div>

          <div class="intro__card">
            <img src="https://picsum.photos/304/200" class="intro__img" />
            <p class="intro__text">Trích xuất thông tin bản dịch</p>
          </div>
        </div>
      </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
      <p class="footer__text">© 2026 Site name</p>
    </footer>
  </body>
</html>
