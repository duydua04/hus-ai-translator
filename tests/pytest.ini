[pytest]
minversion = 6.0
testpaths = tests
python_files = test_*.py
# Add common report outputs: pytest-html and Allure
# --html requires pytest-html plugin; --alluredir requires allure-pytest
addopts = -q --self-contained-html --html=tests/logs/report.html --alluredir=tests/logs/allure-results

[pytest-html]
loglevel = INFO
metadata = True
