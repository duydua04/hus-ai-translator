[pytest]
pythonpath = .
addopts =
    --html=logs/report.html
    --self-contained-html
    --alluredir=logs/allure-results
    -v
    --tb=short
    --headed
testpaths = e2e
markers =
    smoke: Kiểm thử nhanh các luồng chính
    regression: Kiểm thử hồi quy đầy đủ
    auth: Kiểm thử xác thực (đăng ký, đăng nhập)
    admin: Kiểm thử chức năng admin

